[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["firebase-admin"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    # script-src carries one specific sha256 hash - accounts.google.com's
    # gsi/client library (loaded for admin Google Sign-In) injects a small
    # inline <script> of its own into the page for its iframe/postMessage
    # relay once it runs. That script body is static and Google-controlled
    # (same hash on every site using it, not attacker-influenceable), so a
    # hash allowlist entry is the correct CSP fix - unlike 'unsafe-inline',
    # it permits only this exact script content and nothing else.
    # img-src additionally allows img.dojicreates.com - the public R2
    # bucket (dc-notes-images, separate from the private PDF bucket) that
    # New Releases thumbnails preview from in the New Releases tab.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'sha256-SxSYPB3Py6VIb6nk38ViSld/+yGlf3u2EGzkz3rkNnw=' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://accounts.google.com; font-src 'self'; img-src 'self' data: https://*.googleusercontent.com https://img.dojicreates.com https://pub-273d1fa111dc47f695f3f72ee5e0e2f4.r2.dev; connect-src 'self' https://accounts.google.com https://*.r2.cloudflarestorage.com; frame-src 'self' https://accounts.google.com; worker-src 'self'; frame-ancestors 'none'; upgrade-insecure-requests"
